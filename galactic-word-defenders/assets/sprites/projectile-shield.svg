<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Shield pulse -->
  <rect x="4" y="4" width="8" height="8" fill="none" stroke="#4a9eff" stroke-width="2"/>
  <rect x="6" y="6" width="4" height="4" fill="#4a9eff" opacity="0.5"/>
  
  <!-- Center -->
  <rect x="7" y="7" width="2" height="2" fill="#7ab8ff"/>
  
  <!-- Corners -->
  <rect x="3" y="3" width="1" height="1" fill="#4a9eff"/>
  <rect x="12" y="3" width="1" height="1" fill="#4a9eff"/>
  <rect x="3" y="12" width="1" height="1" fill="#4a9eff"/>
  <rect x="12" y="12" width="1" height="1" fill="#4a9eff"/>
</svg>