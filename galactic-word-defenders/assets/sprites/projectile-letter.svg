<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Letter projectile -->
  <rect x="6" y="4" width="4" height="8" fill="#ffa500"/>
  <rect x="7" y="5" width="2" height="6" fill="#ffcc4a"/>
  
  <!-- Trail -->
  <rect x="7" y="12" width="2" height="2" fill="#ffa500" opacity="0.6"/>
  <rect x="7" y="14" width="2" height="1" fill="#ffa500" opacity="0.3"/>
  
  <!-- Glow -->
  <rect x="5" y="3" width="1" height="10" fill="#ffcc4a" opacity="0.5"/>
  <rect x="10" y="3" width="1" height="10" fill="#ffcc4a" opacity="0.5"/>
</svg>