<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Galactic Word Defenders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a1a;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #game-container canvas {
      max-width: 100%;
      max-height: 100%;
    }
    
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    #ui-overlay > * {
      pointer-events: auto;
    }
    
    .question-panel {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(90vw, 800px);
      background: linear-gradient(180deg, #1a1a3e 0%, #0d0d2b 100%);
      border: 4px solid #4a9eff;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      box-shadow: 0 -10px 40px rgba(74, 158, 255, 0.4);
    }
    
    .question-text {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    
    .question-image {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .question-image img {
      max-width: 150px;
      max-height: 150px;
    }
    
    .answers-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }
    
    .answer-btn {
      background: linear-gradient(180deg, #4a9eff 0%, #2a5fbf 100%);
      border: 3px solid #7ab8ff;
      border-radius: 15px;
      padding: 20px 15px;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.15s ease;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .answer-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(180deg, #5aafff 0%, #3a6fcf 100%);
    }
    
    .answer-btn:active {
      transform: scale(0.95);
    }
    
    .answer-btn.correct {
      background: linear-gradient(180deg, #4aff6a 0%, #2abf4a 100%);
      border-color: #7aff9a;
      animation: pulse 0.3s ease;
    }
    
    .answer-btn.wrong {
      background: linear-gradient(180deg, #ff4a4a 0%, #bf2a2a 100%);
      border-color: #ff7a7a;
      animation: shake 0.3s ease;
    }
    
    .timer-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #4aff6a, #ffaa4a);
      transition: width 0.1s linear;
    }
    
    .hint-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ffaa4a;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    
    .hint-btn.available {
      opacity: 1;
      animation: hintGlow 1s infinite;
    }
    
    .hidden {
      display: none !important;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    @keyframes hintGlow {
      0%, 100% { box-shadow: 0 0 10px #ffaa4a; }
      50% { box-shadow: 0 0 25px #ffaa4a; }
    }
    
    #pause-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255,255,255,0.2);
      border: 2px solid #fff;
      border-radius: 10px;
      width: 50px;
      height: 50px;
      font-size: 24px;
      color: #fff;
      cursor: pointer;
      pointer-events: auto;
    }
    
    #hud {
      position: absolute;
      top: 15px;
      left: 15px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    
    #hud span {
      margin-right: 20px;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <div id="ui-overlay">
    <button id="pause-btn" class="hidden">⏸</button>
    
    <div id="hud" class="hidden">
      <span>❤️ <span id="lives-display">3</span></span>
      <span>⭐ <span id="score-display">0</span></span>
      <span>🪙 <span id="coins-display">0</span></span>
    </div>
    
    <div id="question-panel" class="question-panel hidden">
      <button id="hint-btn" class="hint-btn">💡</button>
      <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
      <div class="question-image" id="question-image"></div>
      <div class="question-text" id="question-text"></div>
      <div class="answers-grid" id="answers-grid"></div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
  <!-- Built with Vite - run 'npm run build' to create standalone dist folder -->
</body>
</html>
